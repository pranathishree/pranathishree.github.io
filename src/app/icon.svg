<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Soft dark charcoal background to match browser tab themes -->
  <rect width="32" height="32" rx="8" fill="#0A0A0C"/>
  
  <!-- Subtle glowing circular starry borders -->
  <circle cx="16" cy="16" r="13" stroke="#FFC5D9" stroke-width="0.75" opacity="0.6"/>
  <circle cx="16" cy="16" r="11" stroke="#D4BFF9" stroke-width="0.5" stroke-dasharray="2 2" opacity="0.4"/>
  
  <!-- Starburst Sparkles -->
  <path d="M 26,7 Q 26,10 23,10 Q 26,10 26,13 Q 26,10 29,10 Q 26,10 26,7 Z" fill="#F5E6C9" opacity="0.8"/>
  <path d="M 6,24 Q 6,26 4,26 Q 6,26 6,28 Q 6,26 8,26 Q 6,26 6,24 Z" fill="#FFC5D9" opacity="0.7"/>

  <!-- Elegant Georgia Serif Monogram -->
  <text x="16" y="20.5" font-family="Georgia, serif" font-size="11.5" font-style="italic" font-weight="bold" fill="url(#roseGoldGradient)" text-anchor="middle">PR</text>
  
  <defs>
    <linearGradient id="roseGoldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFC5D9" />
      <stop offset="50%" stop-color="#D4BFF9" />
      <stop offset="100%" stop-color="#F5E6C9" />
    </linearGradient>
  </defs>
</svg>
